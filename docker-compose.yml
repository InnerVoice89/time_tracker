services:

  db:
    image: postgres:15
    container_name: tracker-db
    restart: always
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: tracker-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/tracker
      DB_USERNAME: user
      DB_PASSWORD: pass

volumes:
  postgres-data: